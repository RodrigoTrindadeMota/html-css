<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="favicon.ico" type="image/x-icon">
    <title>Tags HTML</title>
</head>
<body>
    <h1>Tags em HTML</h1>
    <h2>Em HTML5, podemos inserir os elementos a seguir. Passe o mouse sobre os termos para descobrir qual tag deverá utilizar em cada caso.</h2>
    <p>
        <ul>
            <li><abbr title="&lt;p&gt;">Páragrafo</abbr></li>
            <li><abbr title="&lt;h1&gt; ao &lt;h6&gt;">Títulos</abbr></li>
            <li><abbr title="&lt;img&gt;">Imagens</abbr></li>
            <li><abbr title="&lt;abbr&gt;">Abreviações</abbr></li>
            <li><abbr title="&lt;code&gt;">Código-fonte</abbr></li>
            <li><abbr title="&lt;ol&gt; e &lt;li&gt;">Listas numeradas</abbr></li>
            <li><abbr title="&lt;ul&gt; e &lt;li&gt;">Listas demarcadas</abbr></li>
        </ul>
    <p>
</body>
</html>
