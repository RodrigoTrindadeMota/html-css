<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gradiente em CSS</title>
    <style>
        *{ /* Configurações globais das CSS */
            height: 100%;
        }
        body{
            background-image: linear-gradient(to right, #9709F5, #DE00E1, #F700E2, #FF0D4F, #FFC301); /* linear-gradient e radial-gradient */ /* right, left, top e bottom. pode colocar por numero deg o radial é somente por formas ex: circle*/
            background-attachment: fixed;
        }
    </style>
</head>
<body>
    <h1>Testando Gradiente</h1>
</body>
</html>
